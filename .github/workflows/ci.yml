name: CI/CD Pipeline - Pruebas y QA
on:
  push:
    branches: ["main", "master", "develop-pedro"]
  pull_request:
    branches: ["main", "master", "develop-pedro"]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Revisión de estilo con flake8
        run: |
          flake8 src tests

      - name: Verificación de formateo con black e isort
        run: |
          black --check src tests
          isort --check-only src tests

      - name: Ejecutar pruebas unitarias (pytest)
        run: |
          pytest --cov=src tests/

  security-scan:
    name: Auditoría de vulnerabilidades (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Construir imagen de la app
        run: docker build -t comerciotech-app:${{ github.sha }} -f Dockerfile.app .

      - name: Construir imagen de MongoDB
        run: docker build -t comerciotech-mongodb:${{ github.sha }} -f Dockerfile .

      - name: Escanear imagen de la app
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "comerciotech-app:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          severity: "HIGH,CRITICAL"

      - name: Escanear imagen de MongoDB
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "comerciotech-mongodb:${{ github.sha }}"
          format: "table"
          exit-code: "1" # nota para compañeros: cambiar a 0 el exit-code por si encuentra una vulnerabilidad relacionada a mongo o python que no se pueda reparar
          severity: "HIGH,CRITICAL"
          trivyignores: ".trivyignore" # solo para incluir dependencias que trackea Trivy pero realmente no se están utilizando. Mayor información consultar a '.trivyignore'

      - name: Escanear dependencias Python (requirements.txt)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "HIGH,CRITICAL"
