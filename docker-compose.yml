name: comerciotech

networks:
  comercio_tech:
    driver: bridge

volumes:
  mongo_data:
    driver: local

services:
  mongodb:
    image: mongo:7.0.21
    build: .
    container_name: mongodb_comerciotech
    restart: unless-stopped
    command: ["mongod", "--wiredTigerCacheSizeGB", "1", "--auth"]

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: comercio_tech

    ports:
      - "27018:27017"

    networks:
      - comercio_tech

    volumes:
      - mongo_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G

    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
          "-u",
          "${MONGO_ROOT_USERNAME}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128m
    shm_size: "256m"

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
