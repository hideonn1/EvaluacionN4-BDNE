name: comerciotech

networks:
  comercio_tech:
    driver: bridge

volumes:
  mongo_data:
    driver: local

services:
  mongodb:
    image: mongo:7.0.21
    build: .
    container_name: mongodb_comerciotech
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}

    ports:
      - "27018:27017"

    networks:
      - comercio_tech

    volumes:
      - mongo_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G

    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
          "-u",
          "${MONGO_ROOT_USERNAME}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128m
    shm_size: "256m"

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  app:
    image: python:3.11-slim
    container_name: app_comerciotech
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - comercio_tech
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      MONGO_DATABASE: ${MONGO_DATABASE}
    # agregamos manejo de señales TTY para mantener el contenedor interactivo si es necesario
    stdin_open: true
    tty: true
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && python src/main.py"
