name: comerciotech

networks:
  comercio_tech:
    driver: bridge

volumes:
  mongo_data:
    driver: local

services:
  mongodb:
    image: mongo:7.0.21
    build: .
    container_name: mongodb_comerciotech
    restart: unless-stopped

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
      APP_USERNAME: ${APP_USERNAME}
      APP_PASSWORD: ${APP_PASSWORD}
      AUDITOR_USERNAME: ${AUDITOR_USERNAME}
      AUDITOR_PASSWORD: ${AUDITOR_PASSWORD}
      MONITOR_USERNAME: ${MONITOR_USERNAME}
      MONITOR_PASSWORD: ${MONITOR_PASSWORD}

    ports:
      - "27018:27017"

    networks:
      - comercio_tech

    volumes:
      - mongo_data:/data/db
      - ./src/scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro

    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G

    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand('ping').ok",
          "-u",
          "${MONGO_ROOT_USERNAME}",
          "-p",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=128m
    shm_size: "256m"

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: app_comerciotech
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - comercio_tech
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      PYTHONUTF8: "1"
      MONGO_HOST: mongodb
      MONGO_PORT: "27017"
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      APP_USERNAME: ${APP_USERNAME}
      APP_PASSWORD: ${APP_PASSWORD}
      AUDITOR_USERNAME: ${AUDITOR_USERNAME}
      AUDITOR_PASSWORD: ${AUDITOR_PASSWORD}
      MONITOR_USERNAME: ${MONITOR_USERNAME}
      MONITOR_PASSWORD: ${MONITOR_PASSWORD}
    # agregamos manejo de señales TTY para mantener el contenedor interactivo si es necesario
    stdin_open: true
    tty: true
    command: ["python", "src/main.py"]
